<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>正在刷新同学蹭饭地图</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      box-sizing: border-box;
    }
    .panel {
      max-width: 360px;
      line-height: 1.6;
    }
    .title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .text {
      margin: 0;
      font-size: 14px;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="panel">
    <p class="title">正在切到最新版</p>
    <p class="text">会自动清理旧缓存，然后重新打开地图。</p>
  </div>
  <script>
    (async function() {
      try {
        localStorage.removeItem('classmapper-roster-v1');
      } catch (error) {}

      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys
            .filter((key) => key.indexOf('classmapper-pwa-') === 0)
            .map((key) => caches.delete(key)));
        }
      } catch (error) {}

      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
      } catch (error) {}

      window.location.replace('./?fresh=' + Date.now());
    })();
  </script>
</body>
</html>
